name: kindmap
description: A new Flutter project.
version: 1.0.0+1
environment: 
  sdk: '>=2.12.0 <3.0.0'
dependencies: 
  flutter: 
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  flutter_riverpod: ^2.4.9
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  equatable: ^2.0.5
  google_sign_in: ^5.0.7
  flutter_svg_provider: ^1.0.7
  outline_gradient_button: ^2.0.1+1
  google_maps_flutter: ^2.5.0
  intl: ^0.18.0
dev_dependencies: 
  flutter_test: 
    sdk: flutter
flutter: 
  uses-material-design: true
  assets: 
    - assets/
    - assets/images/
  fonts: 
    - family: Plus Jakarta Sans
      fonts: 
        - asset: assets/fonts/PlusJakartaSansRomanBold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSansRomanMedium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSansRomanRegular.ttf
          weight: 400
    - family: Smooch Sans
      fonts: 
        - asset: assets/fonts/SmoochSansSemiBold.ttf
          weight: 600
        - asset: assets/fonts/SmoochSansRegular.ttf
          weight: 400
    - family: Poppins
      fonts: 
        - asset: assets/fonts/PoppinsMedium.ttf
          weight: 500
        - asset: assets/fonts/PoppinsRegular.ttf
          weight: 400
    - family: Staatliches
      fonts: 
        - asset: assets/fonts/StaatlichesRegular.ttf
          weight: 400
    - family: Lexend Deca
      fonts: 
        - asset: assets/fonts/LexendDecaRegular.ttf
          weight: 400
    - family: Telex
      fonts: 
        - asset: assets/fonts/TelexRegular.ttf
          weight: 400
